services:
  mysql:
    image: mysql:8.0
    container_name: nina-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: nina_db
    ports:
      - "3306:3306"
    volumes:
      - nina_mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  nina_mysql_data:
